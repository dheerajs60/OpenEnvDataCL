spec_version: 1
name: data_cleaner_env
version: "1.0.0"
description: >
  A multi-step reinforcement-learning benchmark for evaluating LLM agents on
  structured CRM data cleaning. Three difficulty tiers (easy / medium / hard),
  each graded by a dedicated scorer that measures null-handling, duplicate
  removal, date normalisation, schema repair, and category correction.

author: DataCL
license: MIT
tags: [openenv, data-cleaning, crm, fastapi, reinforcement-learning]

tasks:
  - id: easy
    name: Easy Imputation
    difficulty: easy
    max_steps: 20
    score_range: [0.0, 1.0]

  - id: medium
    name: Medium Deduplication
    difficulty: medium
    max_steps: 20
    score_range: [0.0, 1.0]

  - id: hard
    name: Hard Full CRM Cleanup
    difficulty: hard
    max_steps: 20
    score_range: [0.0, 1.0]

endpoints:
  reset:    POST /reset?task_id={task_id}
  step:     POST /step
  state:    GET  /state
  tasks:    GET  /tasks
  grader:   GET  /grader
  baseline: GET  /baseline
  validate: GET  /validate
  health:   GET  /health