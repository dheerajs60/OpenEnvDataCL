spec_version: 1
name: data_cleaner_env
description: Real-world data cleaning benchmark for AI agents
entrypoint: server.app:main
runtime: fastapi
port: 8000

tasks:
  - name: easy
    grader: server.grader.Grader
    kwargs:
      difficulty: easy
  
  - name: medium
    grader: server.grader.Grader
    kwargs:
      difficulty: medium
  
  - name: hard
    grader: server.grader.Grader
    kwargs:
      difficulty: hard